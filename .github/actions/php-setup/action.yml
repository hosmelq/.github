name: Setup PHP

description: Setup PHP and required tools

inputs:
  php-coverage:
    default: 'none'
    description: Coverage driver to use.
    required: false

  php-extensions:
    default: ''
    description: PHP extensions to install.
    required: false

  php-tools:
    default: 'cs2pr'
    description: PHP tools to install.
    required: false

  php-version:
    default: '8.5'
    description: The PHP version to use.
    required: false

runs:
  using: composite

  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        coverage: ${{ inputs.php-coverage }}
        extensions: ${{ inputs.php-extensions }}
        php-version: ${{ inputs.php-version }}
        tools: ${{ inputs.php-tools }}
